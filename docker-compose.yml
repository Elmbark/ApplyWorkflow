services:
  apply_workflow:
    build: .
    ports:
      - "8000:8000"
    environment:
      # One persistent directory avoids Docker creating directories when an
      # optional file (for example credentials.json) does not exist.
      DATA_DIR: /app/data
      OUTPUT_DIR: /app/data/output
      EXCEL_FILE: /app/data/applications.xlsx
      PROFILE_FILE: /app/data/profile.json
      GMAIL_CREDENTIALS_FILE: /app/data/credentials.json
      GMAIL_TOKEN_FILE: /app/data/token.json
      APP_CONFIG_FILE: /app/data/settings.json
    volumes:
      - ./data:/app/data:Z
    restart: unless-stopped
